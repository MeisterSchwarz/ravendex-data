name: Merge zone names

on:
  push:
    branches:
      - master
    paths:
      - "contribute/**"

permissions:
  contents: write

concurrency:
  group: merge-zone-data
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Gebietsnamen und Core-Zonen mergen
        run: python scripts/merge_zone_uploads.py

      - name: Änderungen committen
        run: |
          if git diff --quiet; then
            echo "Keine Änderungen vorhanden."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add core/zones i18n contribute
          git commit -m "Merge uploaded zone names"
          git push